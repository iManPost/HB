/* ==========================
   ปิด F12 / DevTools Shortcut
========================== */

document.addEventListener("keydown", function(e){

    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey &&
            ["I","J","C"].includes(e.key.toUpperCase())
        ) ||
        (e.ctrlKey && e.key.toUpperCase() === "U")
    ){
        e.preventDefault();
        return false;
    }

});

/* ==========================
   ตรวจ DevTools
========================== */

setInterval(function(){

    const widthThreshold =
        window.outerWidth - window.innerWidth > 160;

    const heightThreshold =
        window.outerHeight - window.innerHeight > 160;

            align-items:center;

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.player-wrap { max-width: 900px; margin: 0 auto; padding: 1rem; }
.channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
.ch-btn { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: border-color 0.15s; }
.ch-btn:hover { border-color: var(--border-strong); }
.ch-btn.active { border: 1.5px solid var(--border-accent); background: var(--bg-accent); }
.ch-btn img { width: 48px; height: 48px; object-fit: contain; border-radius: 4px; }
.ch-btn span { font-size: 11px; color: var(--text-secondary); text-align: center; font-weight: 500; }
.ch-btn.active span { color: var(--text-accent); }
.video-box { background: #000; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 16/9; margin-bottom: 1rem; }
video { width: 100%; height: 100%; display: block; }
.video-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); flex-direction: column; gap: 12px; }
.video-overlay.hidden { display: none; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ov-text { color: #fff; font-size: 13px; opacity: 0.8; }
.status-bar { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fill-success); flex-shrink: 0; }
.dot.err { background: var(--fill-danger); }
.dot.loading { background: var(--fill-warning); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.play-btn:hover { background: var(--fill-accent-hover); }
</style>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dashjs@4.7.4/dist/dash.all.min.js"></script>
<script>
const CHANNELS = [
  {
    id: "hbo-hits",
    name: "HBO Hits",
    logo: "https://i.imgur.com/tGSLZWz.png",
    url: "https://qp-pldt-live-bpk-02-prod.akamaized.net/bpk-tv/cg_hbohits/default1/index.mpd",
    kid: "b04ae8017b5b4601a5a0c9060f6d5b7d",
    key: "a8795f3bdb8a4778b7e888ee484cc7a1"
  },
  {
    id: "hbo-family",
    name: "HBO Family",
    logo: "https://i.imgur.com/SefoKAw.png",
    url: "https://qp-pldt-live-bpk-02-prod.akamaized.net/bpk-tv/cg_hbofam/default/index.mpd",
    kid: "872910c843294319800d85f9a0940607",
    key: "f79fd895b79c590708cf5e8b5c6263be"
  },
  {
    id: "hbo-signature",
    name: "HBO Signature",
    logo: "https://i.imgur.com/3L9QRDw.png",
    url: "https://qp-pldt-live-bpk-02-prod.akamaized.net/bpk-tv/cg_hbosign/default/index.mpd",
    kid: "a06ca6c275744151895762e0346380f5",
    key: "559da1b63eec77b5a942018f14d3f56f"
  }
];

let player = null;
let selectedCh = null;

function hexToBase64(hex) {
  const bytes = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
  let bin = "";
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
}

function setStatus(msg, state) {
  const dot = document.getElementById("dot");
  const txt = document.getElementById("status-txt");
  txt.textContent = msg;
  dot.className = "dot" + (state === "err" ? " err" : state === "loading" ? " loading" : "");
}

function showOverlay(html) {
  const ov = document.getElementById("overlay");
  ov.innerHTML = html;
  ov.classList.remove("hidden");
}

function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden");
}

const grid = document.getElementById("ch-grid");
CHANNELS.forEach(ch => {
  const btn = document.createElement("button");
  btn.className = "ch-btn";
  btn.id = "btn-" + ch.id;
  btn.innerHTML = `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none'"><span>${ch.name}</span>`;
  btn.onclick = () => selectChannel(ch);
  grid.appendChild(btn);
});

function selectChannel(ch) {
  selectedCh = ch;
  document.querySelectorAll(".ch-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + ch.id).classList.add("active");
  setStatus("เลือกแล้ว: " + ch.name + " — กด เล่น เพื่อเริ่ม", "ok");
  showOverlay(`<div class="spinner"></div><div class="ov-text">เลือก: ${ch.name}</div>`);
}

document.getElementById("play-btn").onclick = () => {
  if (!selectedCh) {
    setStatus("กรุณาเลือกช่องก่อน", "err");
    return;
  }
  startPlayer(selectedCh);
};

function startPlayer(ch) {
  const proxy = document.getElementById("proxy-sel").value;
  const mpdUrl = proxy ? proxy + encodeURIComponent(ch.url) : ch.url;

  setStatus("กำลังโหลด: " + ch.name + "...", "loading");
  showOverlay(`<div class="spinner"></div><div class="ov-text">กำลังโหลด ${ch.name}...</div>`);

  if (player) {
    try { player.destroy(); } catch(e) {}
    player = null;
  }

  const vid = document.getElementById("vid");

  const kidB64 = hexToBase64(ch.kid);
  const keyB64 = hexToBase64(ch.key);

  const clearKeyObj = {};
  clearKeyObj[kidB64] = keyB64;

  player = dashjs.MediaPlayer().create();
  player.initialize(vid, mpdUrl, true);

  player.setProtectionData({
    "org.w3.clearkey": {
      clearkeys: clearKeyObj
    }
  });

  player.updateSettings({
    streaming: {
      abr: { autoSwitchBitrate: { audio: true, video: true } },
      liveCatchup: { enabled: true }
    },
    errors: { recoverAttempts: { mediaErrorDecode: 3 } }
  });

  player.on(dashjs.MediaPlayer.events.PLAYBACK_STARTED, () => {
    setStatus("กำลังเล่น: " + ch.name, "ok");
    hideOverlay();
  });

  player.on(dashjs.MediaPlayer.events.ERROR, (e) => {
    const msg = e.error?.message || e.error?.code || JSON.stringify(e.error);
    setStatus("ข้อผิดพลาด: " + msg, "err");
    showOverlay(`<div class="ov-text" style="color:#f87;">เกิดข้อผิดพลาด</div><div class="ov-text" style="font-size:11px;max-width:280px;text-align:center;">${msg}</div>`);
  });

  player.on(dashjs.MediaPlayer.events.PLAYBACK_WAITING, () => {
    showOverlay(`<div class="spinner"></div><div class="ov-text">กำลังบัฟเฟอร์...</div>`);
  });

  player.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
    hideOverlay();
  });
}
</script>


</body>
