<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shaka Player Demo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.2/shaka-player.compiled.min.js"></script>

<style>
html,body{
    margin:0;
    background:#000;
    height:100%;
}

video{
    width:100%;
    height:100vh;
    background:#000;
}

#log{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    max-height:180px;
    overflow:auto;
    background:rgba(0,0,0,.7);
    color:#0f0;
    padding:10px;
    font-family:monospace;
    font-size:13px;
}
</style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<pre id="log"></pre>

<script>

const MPD_URL = "https://qp-pldt-live-bpk-02-prod.akamaized.net/bpk-tv/cg_hbohits/default1/index.mpd";

const log = document.getElementById("log");

function println(msg){
    console.log(msg);
    log.textContent += msg + "\n";
}

async function init(){

    if(!shaka.Player.isBrowserSupported()){
        println("Browser ไม่รองรับ");
        return;
    }

    const video=document.getElementById("video");

    const player=new shaka.Player(video);

    player.addEventListener("error",e=>{
        println("Player Error : "+JSON.stringify(e.detail));
    });

    try{

        println("Loading...");

        await player.load(MPD_URL);

        println("Load Success");

    }catch(err){

        println(err);

    }

}

document.addEventListener("DOMContentLoaded",init);

</script>

</body>
</html>
